{% extends "auctions/layout.html" %}

{% block body %}
    <div class="container d-flex justify-content-center align-items-center mt-2">
        <div class="card p-4 w-100" style="max-width: 400px;">
            <h2 class="text-center mb-4">Register</h2>

            {% if message %}
                <div class="alert alert-danger text-center">{{ message }}</div>
            {% endif %}

            <form action="{% url 'register' %}" method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <input class="form-control" autofocus type="text" name="username" placeholder="Username">
                </div>
                <div class="mb-3">
                    <input class="form-control" type="email" name="email" placeholder="Email Address">
                </div>
                <div class="mb-3">
                    <input class="form-control" type="password" name="password" placeholder="Password">
                </div>
                <div class="mb-3">
                    <input class="form-control" type="password" name="confirmation" placeholder="Confirm Password">
                </div>
                <button class="btn btn-primary w-100 rounded-pill d-flex justify-content-between align-items-center" type="submit">
                    Register 
                    <i class="fa-solid fa-user-plus ms-2"></i>
                </button>                
            </form>

            <p class="mt-3 text-center">Already have an account? <a href="{% url 'login' %}">Sign In here <i class="fa-solid fa-arrow-up-right-from-square fa-xs"></i></a></p>
        </div>
    </div>
{% endblock %}

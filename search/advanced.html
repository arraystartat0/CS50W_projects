<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goodle Advanced Search</title>
    <link rel="icon" href="https://www.google.com/favicon.ico" type="image/x-icon">

    <!--Bootstrap 5-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

    <!--Icon pack-->
    <script src="https://kit.fontawesome.com/2c61bcd5f2.js" crossorigin="anonymous"></script>

    <!--Font-->
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;700&display=swap" rel="stylesheet">

    <!--CSS-->
    <style>
        body {
            background-color: rgb(32, 33, 36);
            color: white;
            font-family: 'Nunito Sans', sans-serif;
        }
        .form-label, .inputField {
            color: #e8eaed !important;
        }
        .form-control {
            border: 1px solid #4d5156;
        }
        .form-control::placeholder {
            color: #9aa0a6;
        }
        .section-title {
            color: #FF6E40;
            margin-bottom: 20px;
            font-size: 24px;
        }
        .instructions {
            color: #9aa0a6;
            font-size: 14px;
        }
        .form-row {
            margin-bottom: 15px;
        }
        .btn-advanced-search {
            background-color: #8ab4f8;
            color: white;
            border: #8ab4f8;
            padding: 10px 20px;
            border-radius: 5px;
        }
        .btn-advanced-search:hover {
            background-color: #709cf8;
        }
        input {
            border: 1px solid #5f6368;
            color: #fff;
        }
        @media (max-width: 768px) {
            .form-control {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarText" aria-controls="navbarText" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarText">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link text-white" href="index.html">Google Search</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container my-5">
        <h2 class="section-title">Advanced Search</h2>
        <hr>
        <h5>Find pages with...</h5>
        <div class="row pt-3">
            <div class="col-lg-6">
                <form action="https://www.google.com/search">
                    <div class="row mb-3">
                        <div class="col-12 col-lg-6">
                            <label for="allWords" class="form-label">All these words:</label>
                        </div>
                        <div class="col-12 col-lg-6">
                            <input class="bg-transparent form-control inputField" type="text" id="allWords" name="as_q">
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-12 col-lg-6">
                            <label for="exactPhrase" class="form-label">This exact word or phrase:</label>
                        </div>
                        <div class="col-12 col-lg-6">
                            <input class="bg-transparent form-control inputField" type="text" id="exactPhrase" name="as_epq">
                        </div>
                    </div>   
                    <div class="row mb-3">
                        <div class="col-12 col-lg-6">
                            <label for="anyWords" class="form-label">Any of these words:</label>
                        </div>
                        <div class="col-12 col-lg-6">
                            <input class="bg-transparent form-control inputField" type="text" id="anyWords" name="as_oq">
                        </div>
                    </div>   
                    <div class="row mb-3">
                        <div class="col-12 col-lg-6">
                            <label for="noneWords" class="form-label">None of these words:</label>
                        </div>
                        <div class="col-12 col-lg-6">
                            <input class="bg-transparent form-control inputField" type="text" id="noneWords" name="as_eq">
                        </div>
                    </div>
                    <div class="form-row mt-3">
                        <button type="submit" class="btn btn-advanced-search">Advanced Search</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>

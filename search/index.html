<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google</title>
    <link rel="icon" href="https://www.google.com/favicon.ico" type="image/x-icon">

    <!--Bootstrap 5-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

    <!--Icon pack-->
    <script src="https://kit.fontawesome.com/2c61bcd5f2.js" crossorigin="anonymous"></script>

    <!--Font-->
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;700&display=swap" rel="stylesheet">

    <!--CSS-->
    <style>
        body {
            background-color:rgb(32,33,36);
            color: white;
            font-family: 'Nunito Sans', sans-serif;
        }
        .btn:hover{
            border: 1px solid #fff;
        }
        a{
            font-size: 0.8rem !important;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarText" aria-controls="navbarText" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarText">
            <ul class="navbar-nav ms-auto">
              <li class="nav-item">
                <a class="nav-link text-white" href="img.html">Image Search</a>
              </li>
              <li class="nav-item">
                <a class="nav-link text-white" href="advanced.html">Advanced Search</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    <div class="px-4 py-2 my-2 text-center" bis_skin_checked="1">
        <img class="mb-5 img-fluid" alt="Paris Games Archery" height="200" src="https://google.com/logos/doodles/2024/paris-games-archery-day-2-6753651837110537-la202124.gif" title="Paris Games Archery" width="500">
        <form action="https://www.google.com/search">
            <div class="container"> 
              <div class="row justify-content-center">
                <div class="col-12 col-lg-5">
                  <div class="input-group mb-3">
                    <span class="input-group-text bg-transparent" id="basic-addon1" style="border-right:none !important; border-top-left-radius: 50rem; border-bottom-left-radius: 50rem;">
                      <i class="bi bi-search"></i> <i class="fa-solid fa-magnifying-glass" style="color:#fff;"></i>
                    </span>
                    <input type="text" class="form-control bg-transparent" name="q" aria-label="Search" aria-describedby="basic-addon1" 
                      style="border-left:none !important; border-top-right-radius: 50rem; border-bottom-right-radius: 50rem; color: #fff;">
                  </div>
                </div>
              </div>
              <div class="row justify-content-center gx-2">
                <div class="col-6 col-lg-2">
                  <button type="submit" class="btn btn-sm w-100"
                    style="background-color: #303134; border: 1px solid #303134; color: #fff;">Google Search
                  </button>
                </div>
                <div class="col-6 col-lg-2">
                  <button type="submit" class="btn btn-sm w-100" name="btnI" value="I"
                    style="background-color: #303134; border: 1px solid #303134; color: #fff;">I'm Feeling Lucky
                  </button>
                </div>
              </div>
            </div>
        </form>          
    </div>
</body>
</html>

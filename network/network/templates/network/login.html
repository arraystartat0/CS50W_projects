{% extends 'network/layout.html' %}

{% block body %}
  <div class="container-fluid">
    <div class="row justify-content-center">
      <div class="col-12 col-lg-6 d-flex flex-column justify-content-center pt-4 p-0 bg-light">
        <h2 class="text-center mb-4">Login</h2>

        {% if message %}
          <div class="alert alert-danger text-center">{{ message }}</div>
        {% endif %}

        <form class="m-1" action="{% url 'login' %}" method="post">
          {% csrf_token %}
          <div class="form-group mb-3 custom-input-wrapper">
            <input autofocus class="form-control bg-transparent border-0" type="text" name="username" placeholder="Username" />
          </div>
          <div class="form-group mb-3 custom-input-wrapper">
            <input class="form-control bg-transparent border-0" type="password" name="password" placeholder="Password" />
          </div>
          <div class="form-group p-1 mb-3">
            <input class="btn btn-black text-white hoverLight w-100" type="submit" value="Login" />
          </div>
        </form>

        <p class="text-center">
          Don't have an account? <a class="text-black" href="{% url 'register' %}">Register here.</a>
        </p>
      </div>
    </div>
  </div>
{% endblock %}

{% load static %}

<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>{% block title %}Mail{% endblock %}</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <script src="https://kit.fontawesome.com/2c61bcd5f2.js" crossorigin="anonymous"></script>
        <link rel="stylesheet" href="{% static 'mail/styles.css' %}">
        <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet">
        {% block script %}
        {% endblock %}
    </head>
    <body class="text-light" style="background-color:#252422;">
        <div class="container-fluid mt-4">
            {% block body %}
            {% endblock %}
        </div>
    </body>
</html>

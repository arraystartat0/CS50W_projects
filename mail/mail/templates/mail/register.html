{% extends "mail/layout.html" %}

{% block body %}
<div class="d-flex justify-content-center align-items-center" style="height:90vh;">
  <div class="card p-4 rounded-4" style="background-color: #403d39; width: 100%; max-width: 400px; color: #fff;">
    <h2 class="text-center mb-4"><i class="fa-solid fa-user-plus fa-xs"></i> Register</h2>

    {% if message %}
      <div class="alert alert-warning text-center" role="alert">{{ message }}</div>
    {% endif %}

    <form action="{% url 'register' %}" method="post">
      {% csrf_token %}
      <div class="form-group mb-3">
        <input class="form-control" type="email" name="email" placeholder="Email Address">
      </div>
      <div class="form-group mb-3">
        <input class="form-control" type="password" name="password" placeholder="Password">
      </div>
      <div class="form-group mb-3">
        <input class="form-control" type="password" name="confirmation" placeholder="Confirm Password">
      </div>
      <div class="d-grid mb-3">
        <input class="btn btn-success" type="submit" value="Register">
      </div>
    </form>

    <p class="text-center mt-3">
      Already have an account? <a href="{% url 'login' %}" style="color:#eb5e28;"> Log In here <i class="fa-solid fa-up-right-from-square fa-xs"></i></a>
    </p>
  </div>
</div>
{% endblock %}
